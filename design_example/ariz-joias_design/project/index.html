<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Ariz Joias — E-commerce</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="shared/tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  /* Artboard scroll surfaces */
  .az-frame-desktop, .az-frame-mobile {
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .az-frame-desktop::-webkit-scrollbar,
  .az-frame-mobile::-webkit-scrollbar { display: none; }

  /* Tweaks panel */
  .tw-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #fdfaf8; border: 1px solid #E5DBD2;
    padding: 18px 20px; width: 280px; z-index: 1000;
    box-shadow: 0 20px 40px rgba(60,50,45,0.15);
    font-family: 'Jost', system-ui, sans-serif;
    color: #2C2320;
  }
  .tw-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 400; margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 10px; border-bottom: 1px solid #E5DBD2;
  }
  .tw-row { margin-bottom: 14px; }
  .tw-label {
    font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #6E5F57; margin-bottom: 8px;
  }
  .tw-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .tw-opt {
    padding: 7px 12px; font-size: 10.5px; letter-spacing: 0.08em;
    text-transform: uppercase; background: transparent; border: 1px solid #C9B8AC;
    color: #2C2320; cursor: pointer;
  }
  .tw-opt.active { background: #2C2320; color: #fdfaf8; border-color: #2C2320; }
  .tw-close { background: none; border: none; color: #6E5F57; cursor: pointer; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared/primitives.jsx"></script>
<script type="text/babel" src="shared/chrome.jsx"></script>
<script type="text/babel" src="pages/home.jsx"></script>
<script type="text/babel" src="pages/plp-pdp.jsx"></script>

<script type="text/babel" data-presets="env,react">
/* ────── Tweak defaults ────── */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "heroVariant": "wordmark",
  "accentHue": "sage",
  "homePage": "pdp"
}/*EDITMODE-END*/;

/* ────── Device frame ────── */
function Frame({ children, kind, width, height, page, heroVariant }) {
  const scale = kind === 'mobile' ? 1 : 1;
  const chromeBorder = kind === 'mobile' ? '10px solid #2C2320' : 'none';

  return (
    <div className={`az-frame-${kind}`}
      style={{
        width, height,
        background: 'var(--color-bg)',
        border: kind === 'mobile' ? '10px solid #2C2320' : '1px solid #E5DBD2',
        borderRadius: kind === 'mobile' ? 36 : 2,
        overflow: 'auto',
        position: 'relative',
      }}>
      <div className="arizroot" style={{ minHeight: '100%', position: 'relative' }}>
        {children}
      </div>
    </div>
  );
}

function PageShell({ kind, initialPage, heroVariant }) {
  const [page, setPage] = React.useState(initialPage || 'home');
  const [param, setParam] = React.useState(null);
  const mobile = kind === 'mobile';

  const onNav = (p, extra) => {
    setPage(p);
    setParam(extra);
    // scroll scroll container to top
    const scroller = document.activeElement?.closest('.az-frame-desktop, .az-frame-mobile');
    if (scroller) scroller.scrollTop = 0;
  };

  return (
    <ShopProvider>
      <Header mobile={mobile} activePage={page} onNav={onNav} />
      {page === 'home' && <HomePage mobile={mobile} onNav={onNav} heroVariant={heroVariant} />}
      {page === 'plp' && <PLPPage mobile={mobile} onNav={onNav} category={param || 'Brincos'} />}
      {page === 'pdp' && <PDPPage mobile={mobile} onNav={onNav} productId={param || 'flower-pendant-set'} />}
      <Footer mobile={mobile} />
      <CartDrawer mobile={mobile} />
    </ShopProvider>
  );
}

/* ────── Tweaks panel ────── */
function TweaksPanel({ tweaks, setTweaks, visible, onClose }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const Opt = ({ k, val, label }) => (
    <button className={`tw-opt ${tweaks[k] === val ? 'active' : ''}`} onClick={() => set(k, val)}>{label}</button>
  );
  return (
    <div className="tw-panel">
      <div className="tw-title">Tweaks <button className="tw-close" onClick={onClose}>✕</button></div>
      <div className="tw-row">
        <div className="tw-label">Hero da home</div>
        <div className="tw-opts">
          <Opt k="heroVariant" val="split" label="Split editorial" />
          <Opt k="heroVariant" val="wordmark" label="Wordmark" />
          <Opt k="heroVariant" val="mosaic" label="Mosaico" />
        </div>
      </div>
      <div className="tw-row">
        <div className="tw-label">Acento principal</div>
        <div className="tw-opts">
          <Opt k="accentHue" val="sage" label="Sage (logo)" />
          <Opt k="accentHue" val="gold" label="Dourado" />
          <Opt k="accentHue" val="rose" label="Rosé profundo" />
        </div>
      </div>
      <div className="tw-row">
        <div className="tw-label">Página inicial</div>
        <div className="tw-opts">
          <Opt k="homePage" val="home" label="Home" />
          <Opt k="homePage" val="plp" label="Listagem" />
          <Opt k="homePage" val="pdp" label="Produto" />
        </div>
      </div>
    </div>
  );
}

/* ────── Accent switcher ────── */
function applyAccent(hue) {
  const r = document.documentElement;
  if (hue === 'sage') {
    r.style.setProperty('--color-sage', '#8B9778');
    r.style.setProperty('--color-sage-dark', '#6B7759');
    r.style.setProperty('--color-sage-light', '#B8C2A8');
    r.style.setProperty('--color-sage-pale', '#E5E9DC');
  } else if (hue === 'gold') {
    r.style.setProperty('--color-sage', '#C9A96E');
    r.style.setProperty('--color-sage-dark', '#8A7045');
    r.style.setProperty('--color-sage-light', '#E8D5B0');
    r.style.setProperty('--color-sage-pale', '#F3E9D3');
  } else if (hue === 'rose') {
    r.style.setProperty('--color-sage', '#B88B82');
    r.style.setProperty('--color-sage-dark', '#8A5F57');
    r.style.setProperty('--color-sage-light', '#D4A99F');
    r.style.setProperty('--color-sage-pale', '#F0DDD6');
  }
}

/* ────── Root App ────── */
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    applyAccent(tweaks.accentHue);
  }, [tweaks.accentHue]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const DESKTOP_W = 1440;
  const DESKTOP_H = 960;
  const MOBILE_W = 390;
  const MOBILE_H = 820;

  return (
    <>
      <DesignCanvas>
        <DCSection id="home" title="Home" subtitle="Landing — hero editorial + categorias, cápsula trevo, lançamentos, manifesto, bestsellers, feed IG">
          <DCArtboard id="home-desktop" label={`Desktop · Hero ${tweaks.heroVariant}`} width={DESKTOP_W} height={DESKTOP_H}>
            <Frame kind="desktop" width={DESKTOP_W} height={DESKTOP_H}>
              <PageShell kind="desktop" initialPage="home" heroVariant={tweaks.heroVariant} />
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-mobile" label="Mobile · Home" width={MOBILE_W} height={MOBILE_H}>
            <Frame kind="mobile" width={MOBILE_W} height={MOBILE_H}>
              <PageShell kind="mobile" initialPage="home" heroVariant={tweaks.heroVariant} />
            </Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="plp" title="Listagem · Brincos" subtitle="PLP com hero de categoria, filtros funcionais, grid + breaker editorial">
          <DCArtboard id="plp-desktop" label="Desktop · Brincos" width={DESKTOP_W} height={DESKTOP_H}>
            <Frame kind="desktop" width={DESKTOP_W} height={DESKTOP_H}>
              <PageShell kind="desktop" initialPage="plp" />
            </Frame>
          </DCArtboard>
          <DCArtboard id="plp-mobile" label="Mobile · Brincos" width={MOBILE_W} height={MOBILE_H}>
            <Frame kind="mobile" width={MOBILE_W} height={MOBILE_H}>
              <PageShell kind="mobile" initialPage="plp" />
            </Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="pdp" title="Página de produto" subtitle="PDP — galeria + detalhes, reviews, relacionados. Clique em 'Adicionar à sacola' para abrir o drawer">
          <DCArtboard id="pdp-desktop" label="Desktop · Conjunto Flor" width={DESKTOP_W} height={DESKTOP_H}>
            <Frame kind="desktop" width={DESKTOP_W} height={DESKTOP_H}>
              <PageShell kind="desktop" initialPage="pdp" />
            </Frame>
          </DCArtboard>
          <DCArtboard id="pdp-mobile" label="Mobile · Conjunto Flor" width={MOBILE_W} height={MOBILE_H}>
            <Frame kind="mobile" width={MOBILE_W} height={MOBILE_H}>
              <PageShell kind="mobile" initialPage="pdp" />
            </Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={editMode} onClose={() => setEditMode(false)} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
